<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>OPERATION CUTLINE — Accueil</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    body { background: var(--bg); overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .main-container { text-align: center; z-index: 10; padding: 2rem; }
    .team-selection { display: flex; gap: 2rem; margin-top: 3rem; justify-content: center; }
  </style>
</head>
<body>
  <div class="scanline-overlay"></div>
  <div class="grid-bg"></div>
  
  <div class="main-container">
    <div class="op-label">Joint Crisis Response Exercise</div>
    <h1 class="main-title">OPERATION<br><span>CUTLINE</span></h1>
    
    <div class="team-selection">
      <button class="team-btn" onclick="selectTeam('blue')">
        <div class="team-card blue">
          <div class="team-name">BLUE TEAM</div>
          <div class="team-role">Défense & Restauration</div>
          <div class="team-enter">Entrer dans le briefing →</div>
        </div>
      </button>
      <button class="team-btn" onclick="selectTeam('red')">
        <div class="team-card red">
          <div class="team-name">RED TEAM</div>
          <div class="team-role">Interdiction & Nettoyage</div>
          <div class="team-enter">Entrer dans le briefing →</div>
        </div>
      </button>
    </div>
  </div>

  <script>
    function selectTeam(team) {
      localStorage.setItem('crisisTeam', team);
      localStorage.setItem('crisisPhase', '1');
      window.location.href = 'pages/phase1.html';
    }
  </script>
</body>
</html>
