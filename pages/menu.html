<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MENU — OPERATION CUTLINE</title>
  <link rel="stylesheet" href="../css/global.css">

  <style>
    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .menu-container {
      text-align: center;
      padding: 2rem;
      max-width: 900px;
      width: 100%;
    }

    .title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 3rem;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 3rem;
      letter-spacing: 0.2em;
    }

    .phase-grid {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .phase-card {
      width: 220px;
      padding: 1.5rem;
      border: 1px solid rgba(74,158,255,0.3);
      background: rgba(74,158,255,0.03);
      cursor: pointer;
      transition: 0.25s;
      position: relative;
    }

    .phase-card:hover {
      transform: translateY(-5px);
      border-color: var(--blue);
      box-shadow: 0 10px 30px rgba(74,158,255,0.2);
    }

    .phase-title {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
    }

    .phase-desc {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .locked {
      border-color: rgba(255,74,74,0.3);
      background: rgba(255,74,74,0.03);
    }

    .locked:hover {
      border-color: var(--red);
      box-shadow: 0 10px 30px rgba(255,74,74,0.2);
    }

    .status-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; gap: 1rem;
      padding: 0.5rem 2rem;
      font-size: 0.6rem;
      font-family: 'Share Tech Mono', monospace;
      border-bottom: 1px solid rgba(74,158,255,0.1);
      background: rgba(5,10,16,0.9);
    }

    .status-clock {
      margin-left: auto;
      color: var(--accent);
    }
  </style>
</head>

<body>

<div class="status-bar">
  <span>MISSION SELECT</span>
  <span>·</span>
  <span>AUTHORIZED ACCESS ONLY</span>
  <span class="status-clock" id="clock"></span>
</div>

<div class="menu-container">

  <div class="title">MISSION MENU</div>
  <div class="subtitle">SELECT OPERATIONAL PHASE</div>

  <div class="phase-grid">

    <!-- PHASE 1 -->
    <div class="phase-card" onclick="goPhase1()">
      <div class="phase-title">PHASE 1</div>
      <div class="phase-desc">Initial breach & reconnaissance</div>
    </div>

    <!-- PHASE 2 -->
    <div class="phase-card locked" onclick="unlockPhase2()">
      <div class="phase-title">PHASE 2</div>
      <div class="phase-desc">Restricted access — password required</div>
    </div>

    <!-- PHASE 3 -->
    <div class="phase-card locked" onclick="unlockPhase3()">
      <div class="phase-title">PHASE 3</div>
      <div class="phase-desc">Top secret — clearance needed</div>
    </div>

  </div>
</div>

<script>
  // Clock
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toTimeString().slice(0,8);
  }
  tick();
  setInterval(tick, 1000);

  function goPhase1() {
    window.location.href = "phase1.html";
  }

  function unlockPhase2() {
    let pwd = prompt("Enter password for Phase 2:");
    if (pwd === "cable_cut") {
      window.location.href = "phase2.html";
    } else {
      alert("ACCESS DENIED");
    }
  }

  function unlockPhase3() {
    let pwd = prompt("Enter password for Phase 3:");
    if (pwd === "NordBalt_") {
      window.location.href = "phase3.html";
    } else {
      alert("ACCESS DENIED");
    }
  }
</script>

</body>
</html>
